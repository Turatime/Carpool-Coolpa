<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpool Coolpa — หน้าหลัก</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="headerMount"></div>

  <div class="dashboard-page">
    <main class="dashboard-layout">
      <!-- Welcome Banner -->
      <div class="welcome-banner">
        <div>
          <h2 id="welcomeName">สวัสดี!</h2>
          <p>วันนี้อยากเดินทางไปที่ไหนดี?</p>
        </div>
      </div>

      <!-- Action Grid -->
      <div class="action-grid">
        <button class="action-card" onclick="location.href='/pages/search.html'">
          <strong>🔍 ค้นหาทริป</strong>
          <small>หาเพื่อนร่วมทางไปที่เดียวกับคุณ</small>
        </button>
        <button class="action-card" onclick="location.href='/pages/my-vehicles.html'">
          <strong>🚗 รถของฉัน</strong>
          <small>จัดการรถที่ใช้สร้างทริปของคุณ</small>
        </button>
        <button class="action-card" onclick="location.href='/pages/create-trip.html'">
          <strong>➕ สร้างทริป</strong>
          <small>แชร์ที่ว่างในรถของคุณ</small>
        </button>
        <button class="action-card" onclick="location.href='/pages/my-bookings.html'">
          <strong>📅 รายการจองของฉัน</strong>
          <small>ดูทริปที่คุณจองหรือคนจองคุณ</small>
        </button>
        <button class="action-card" onclick="location.href='/pages/wallet.html'">
          <strong>💳 กระเป๋าเงิน</strong>
          <small>จัดการยอดเงินและประวัติรายการ</small>
        </button>
      </div>

      <!-- Recent Trips -->
      <div class="section-header">
        <h2>ทริปล่าสุด</h2>
        <button class="btn-small" onclick="loadTrips()">🔄 รีเฟรช</button>
      </div>
      <div id="tripsContainer" class="trip-grid"></div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    window.addEventListener('load', () => {
      if (!requireAuth()) return;
      renderHeader('headerMount');
      const user = getUser();
      document.getElementById('welcomeName').textContent = `สวัสดี, ${user.full_name}!`;
      loadTrips();
    });

    async function loadTrips() {
      const user = getUser();
      try {
        const res   = await fetch(`${API_URL}/trips/?user_id=${user.id}`);
        const trips = await res.json();
        renderTrips(trips, 'tripsContainer');
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>

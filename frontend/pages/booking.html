<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpool Coolpa — Trip Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .trip-details-container {
      display: grid;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .detail-card {
      background: var(--surface-solid);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .driver-profile-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .driver-avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ffe5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .driver-info-meta h2 {
      margin: 0 0 4px;
      font-size: 1.5rem;
      color: var(--text-strong);
    }

    .driver-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #ecfdf5;
      color: #10b981;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 8px;
    }

    .contact-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-contact {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
    }

    .btn-call { background: #e0f2fe; color: #0369a1; }
    .btn-message { background: #f0fdf4; color: #166534; }

    .vehicle-info {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      border-left: 4px solid #a8d5e2;
    }

    .vehicle-info h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--text-strong);
    }

    .vehicle-detail {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .vehicle-detail label { color: var(--text-soft); }
    .vehicle-detail span { font-weight: 600; color: var(--text-strong); }

    .route-section {
      position: relative;
      padding-left: 30px;
    }

    .route-line {
      position: absolute;
      left: 7px;
      top: 10px;
      bottom: 10px;
      width: 2px;
      background: #e2e8f0;
    }

    .route-point {
      position: relative;
      margin-bottom: 30px;
    }

    .route-point:last-child { margin-bottom: 0; }

    .route-dot {
      position: absolute;
      left: -30px;
      top: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      border: 3px solid #a8d5e2;
      z-index: 1;
    }

    .route-dot.dest { border-color: #b8e6d5; }

    .route-label {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-strong);
    }

    .route-sub {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .trip-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .meta-item label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .meta-item span {
      font-weight: 600;
      color: var(--text-strong);
    }

    .passenger-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .counter-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #f0f4f8;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      font-weight: 700;
      color: var(--text-body);
    }

    .counter-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-strong);
      min-width: 40px;
      text-align: center;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .alert.show { display: block; }
    .alert-error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
  </style>
</head>
<body>
  <div id="headerMount"></div>

  <main class="dashboard-layout">
    <button class="btn-small" onclick="history.back()" style="margin-bottom:20px">← Trip Details</button>
    
    <div id="bookingDetails" class="trip-details-container">
      <!-- Content will be loaded here -->
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    window.addEventListener('load', () => {
      if (!requireAuth()) return;
      renderHeader('headerMount');

      const trip = JSON.parse(sessionStorage.getItem('selectedTrip') || 'null');
      if (!trip) { location.href = '/pages/search.html'; return; }

      renderBookingForm(trip);
    });

    function renderBookingForm(trip) {
      const container = document.getElementById('bookingDetails');
      const departureDate = new Date(trip.departure_time);
      
      // ตรวจสอบว่าคนขับมีรีวิวหรือไม่
      const ratingDisplay = trip.driver.rating > 0 
        ? `⭐ ${trip.driver.rating} (${trip.driver.trip_count || '0'} trips)`
        : `ยังไม่มีรีวิว`;
      
      container.innerHTML = `
        <!-- Driver Card -->
        <div class="detail-card">
          <div class="driver-profile-section">
            <div class="driver-avatar-large">${trip.driver.full_name.substring(0,1)}</div>
            <div class="driver-info-meta">
              <h2>${trip.driver.full_name}</h2>
              <div class="driver-stats">
                <span>${ratingDisplay}</span>
              </div>
              <div class="verified-badge">✓ Verified</div>
            </div>
          </div>
          <div class="contact-actions">
            <button class="btn-contact btn-call">📞 Call</button>
            <button class="btn-contact btn-message">💬 Message</button>
          </div>

          <!-- Vehicle Info -->
          <div class="vehicle-info">
            <h4>🚗 รายละเอียดรถ</h4>
            <div class="vehicle-detail">
              <label>ยี่ห้อ/รุ่น:</label>
              <span>${trip.vehicle.brand} ${trip.vehicle.model}</span>
            </div>
            <div class="vehicle-detail">
              <label>ทะเบียน:</label>
              <span>${trip.vehicle.plate_number}</span>
            </div>
            ${trip.vehicle.color ? `
            <div class="vehicle-detail">
              <label>สีรถ:</label>
              <span>${trip.vehicle.color}</span>
            </div>
            ` : ''}
          </div>
        </div>

        <!-- Route Card -->
        <div class="detail-card">
          <div class="route-section">
            <div class="route-line"></div>
            <div class="route-point">
              <div class="route-dot"></div>
              <div class="route-label">${trip.origin}</div>
              <div class="route-sub">Starting point</div>
            </div>
            <div class="route-point">
              <div class="route-dot dest"></div>
              <div class="route-label">${trip.destination}</div>
              <div class="route-sub">Destination</div>
            </div>
          </div>

          <div class="trip-meta-grid">
            <div class="meta-item">
              <label>📅 Date</label>
              <span>${departureDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
            </div>
            <div class="meta-item">
              <label>🕒 Departure</label>
              <span>${departureDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
          </div>
        </div>

        <!-- Booking Card -->
        <div class="detail-card">
          <h3 style="margin-top:0">Select Passengers</h3>
          <div class="passenger-selector">
            <div>
              <div style="font-weight:600">Number of passengers</div>
              <div style="font-size:0.85rem; color:var(--text-soft)">${trip.available_seats} seats available</div>
            </div>
            <div class="counter">
              <button class="counter-btn" onclick="updateSeats(-1)">−</button>
              <span id="bookSeatsValue" class="counter-value">1</span>
              <button class="counter-btn" onclick="updateSeats(1)">+</button>
            </div>
          </div>
          
          <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center">
            <div>
              <div style="font-size:0.85rem; color:var(--text-soft)">Total Price</div>
              <strong id="totalPriceDisplay" style="font-size:1.5rem; color:var(--text-strong)">฿${trip.price_per_seat.toLocaleString()}</strong>
            </div>
            <button class="auth-submit" style="width:auto; padding:16px 32px" onclick="confirmBookingProcess(${trip.id}, ${trip.price_per_seat})">
              Confirm Booking
            </button>
          </div>
          <div id="bookingError" class="alert alert-error" style="margin-top:10px"></div>
        </div>
      `;
    }

    let currentSeats = 1;
    let currentTrip = null;

    window.addEventListener('load', () => {
      currentTrip = JSON.parse(sessionStorage.getItem('selectedTrip') || 'null');
    });

    function updateSeats(delta) {
      const trip = JSON.parse(sessionStorage.getItem('selectedTrip'));
      const newVal = currentSeats + delta;
      if (newVal >= 1 && newVal <= trip.available_seats) {
        currentSeats = newVal;
        document.getElementById('bookSeatsValue').textContent = currentSeats;
        document.getElementById('totalPriceDisplay').textContent = `฿${(currentSeats * trip.price_per_seat).toLocaleString()}`;
      }
    }

    async function confirmBookingProcess(tripId, price) {
      const user = getUser();
      try {
        const res = await fetch(`${API_URL}/bookings/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trip_id: tripId, passenger_id: user.id, seats_booked: currentSeats })
        });
        if (res.ok) {
          alert('Booking successful! Waiting for driver confirmation.');
          location.href = '/pages/dashboard.html';
        } else {
          const data = await res.json();
          showAlert('bookingError', data.detail || 'Booking failed', 'error');
        }
      } catch (e) { showAlert('bookingError', e.message, 'error'); }
    }
  </script>
</body>
</html>

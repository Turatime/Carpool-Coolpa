version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: carpool_db
      MYSQL_ROOT_PASSWORD: yourpassword
    ports:
      - "3306:3306"

  backend:
    build: ./carpool/backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=yourpassword
      - DB_NAME=carpool_db
    depends_on:
      - db

  frontend:
    build: ./carpool/frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
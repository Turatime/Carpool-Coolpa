version: '3.8'

services:
  backend:
    build: ./backend
    container_name: carpool_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # ลบการ mount ./db/data ที่อยู่นอก backend ออก เพื่อให้ใช้ db ภายใน backend เท่านั้น
    environment:
      # กำหนดให้ใช้ db ภายในโฟลเดอร์ db/data ของ backend
      - DATABASE_URL=sqlite:///db/data/carpool.db
      - SECRET_KEY=carpool_coolpa_super_secret_key_2024
    restart: always

  frontend:
    build: ./frontend
    container_name: carpool_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

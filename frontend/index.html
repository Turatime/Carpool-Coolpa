<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpool Coolpa — เข้าสู่ระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-shell">
      <header class="auth-brand">
        <h1>🚗 Carpool</h1>
        <p>แชร์การเดินทาง ประหยัดเงิน ทำความเพื่อน!</p>
      </header>
      <article class="auth-card">
        <div class="auth-tabs">
          <button id="tabLogin" class="auth-tab is-active" onclick="toggleAuthTab('login')">เข้าสู่ระบบ</button>
          <button id="tabRegister" class="auth-tab" onclick="toggleAuthTab('register')">ลงทะเบียน</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form" onsubmit="event.preventDefault(); login()">
          <div class="field">
            <label>อีเมล</label>
            <input id="loginEmail" type="email" placeholder="your@email.com" required>
          </div>
          <div class="field">
            <label>รหัสผ่าน</label>
            <input id="loginPassword" type="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="auth-submit">เข้าสู่ระบบ</button>
          <div id="loginError" class="alert alert-error"></div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form" style="display:none" onsubmit="event.preventDefault(); register()">
          <div class="field">
            <label>ชื่อเต็ม</label>
            <input id="regName" type="text" placeholder="John Doe" required>
          </div>
          <div class="field">
            <label>อีเมล</label>
            <input id="regEmail" type="email" placeholder="your@email.com" required>
          </div>
          <div class="field">
            <label>เบอร์โทร</label>
            <input id="regPhone" type="tel" placeholder="08xxxxxxxx">
          </div>
          <div class="field">
            <label>รหัสผ่าน</label>
            <input id="regPassword" type="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="auth-submit">สร้างบัญชี</button>
          <div id="registerError" class="alert alert-error"></div>
        </form>
      </article>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    /* Redirect if already logged in */
    window.addEventListener('load', () => {
      if (getUser()) window.location.href = '/pages/dashboard.html';
    });

    function toggleAuthTab(type) {
      document.getElementById('tabLogin').classList.toggle('is-active', type === 'login');
      document.getElementById('tabRegister').classList.toggle('is-active', type === 'register');
      document.getElementById('loginForm').style.display    = type === 'login'    ? 'grid' : 'none';
      document.getElementById('registerForm').style.display = type === 'register' ? 'grid' : 'none';
    }

    async function login() {
      const email    = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const res  = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          currentUser = data.user;
          localStorage.setItem('user', JSON.stringify(currentUser));
          window.location.href = '/pages/dashboard.html';
        } else {
          showAlert('loginError', data.detail || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
        }
      } catch (e) { showAlert('loginError', 'Error: ' + e.message, 'error'); }
    }

    async function register() {
      const name     = document.getElementById('regName').value;
      const email    = document.getElementById('regEmail').value;
      const phone    = document.getElementById('regPhone').value;
      const password = document.getElementById('regPassword').value;
      try {
        const res  = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: name, email, phone, password })
        });
        const data = await res.json();
        if (res.ok) {
          currentUser = data.user;
          localStorage.setItem('user', JSON.stringify(currentUser));
          window.location.href = '/pages/dashboard.html';
        } else {
          showAlert('registerError', data.detail || 'ลงทะเบียนล้มเหลว', 'error');
        }
      } catch (e) { showAlert('registerError', 'Error: ' + e.message, 'error'); }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpool Coolpa — ค้นหาทริป</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="headerMount"></div>

  <main class="dashboard-layout">
    <button class="btn-small" onclick="history.back()" style="margin-bottom:20px">← กลับ</button>
    <h2>ค้นหาทริป</h2>

    <div class="search-box">
      <input id="searchOrigin" type="text" placeholder="ต้นทาง (เช่น กรุงเทพ)">
      <input id="searchDest"   type="text" placeholder="ปลายทาง (เช่น เชียงใหม่)">
      <button onclick="searchTrips()">ค้นหา</button>
    </div>

    <div id="searchResults" class="trip-grid"></div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    window.addEventListener('load', () => {
      if (!requireAuth()) return;
      renderHeader('headerMount');
    });

    async function searchTrips() {
      const user   = getUser();
      const origin = document.getElementById('searchOrigin').value;
      const dest   = document.getElementById('searchDest').value;
      try {
        const res   = await fetch(`${API_URL}/trips/?origin=${origin}&destination=${dest}&user_id=${user.id}`);
        const trips = await res.json();
        const container = document.getElementById('searchResults');
        if (trips.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>ไม่พบทริปที่ค้นหา</p></div>';
        } else {
          renderTrips(trips, 'searchResults');
        }
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>

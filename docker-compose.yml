version: '3.8'

services:
  backend:
    build: ./backend
    container_name: carpool_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./db/data:/app/db/data
    environment:
      - DATABASE_URL=sqlite:///./db/data/carpool.db
      - SECRET_KEY=your-secret-key-here
    restart: always

  frontend:
    build: ./frontend
    container_name: carpool_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db-data:

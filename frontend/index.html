<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carpool Coolpa — Share Rides, Save Money</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #fff9f5;
      --bg-middle: #ffe5e5;
      --bg-end: #e5f4f8;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-solid: #ffffff;
      --surface-muted: #f7fafc;
      --text-strong: #2d3748;
      --text-body: #4a5568;
      --text-soft: #718096;
      --line: #e2e8f0;
      --brand-a: #a8d5e2;
      --brand-b: #b8e6d5;
      --shadow-lg: 0 28px 70px rgba(104, 125, 155, 0.18);
      --shadow-md: 0 16px 40px rgba(104, 125, 155, 0.12);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; margin: 0; }
    body {
      font-family: 'Kanit', sans-serif;
      color: var(--text-body);
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 34%),
                  linear-gradient(135deg, var(--bg-start), var(--bg-middle) 48%, var(--bg-end));
    }

    button, input, a { font: inherit; }
    button { border: 0; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    .screen { display: none; }
    .screen.active { display: block; }

    /* AUTH PAGE */
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-shell {
      width: min(100%, 440px);
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-brand h1 {
      margin: 0 0 8px;
      color: var(--text-strong);
      font-size: 2.5rem;
      font-weight: 700;
    }

    .auth-brand p {
      margin: 0;
      color: var(--text-soft);
    }

    .auth-card {
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(14px);
      padding: 32px;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 6px;
      border-radius: 22px;
      background: var(--surface-muted);
      margin-bottom: 24px;
    }

    .auth-tab {
      padding: 14px 16px;
      border-radius: 18px;
      background: transparent;
      color: var(--text-soft);
      font-weight: 500;
      transition: all 180ms ease;
    }

    .auth-tab.is-active {
      background: var(--surface-solid);
      color: var(--text-strong);
      box-shadow: 0 10px 22px rgba(125, 144, 171, 0.14);
    }

    .auth-form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--text-body);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid transparent;
      border-radius: 20px;
      background: var(--surface-muted);
      color: var(--text-strong);
      outline: none;
      transition: all 180ms ease;
    }

    .field input:focus {
      background: var(--surface-solid);
      border-color: rgba(168, 213, 226, 0.95);
      box-shadow: 0 0 0 5px rgba(168, 213, 226, 0.18);
    }

    .auth-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: var(--text-strong);
      box-shadow: var(--shadow-md);
      font-weight: 600;
      transition: all 180ms ease;
    }

    .auth-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 44px rgba(124, 157, 170, 0.2);
    }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .auth-footer a {
      color: var(--brand-a);
      font-weight: 500;
    }

    /* DASHBOARD PAGE */
    .dashboard-page {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
                  linear-gradient(180deg, #fff9f5 0%, #fffdfc 30%, #f7fbfc 100%);
    }

    .dashboard-header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    }

    .dashboard-header__inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
    }

    .dashboard-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      color: var(--text-strong);
    }

    .dashboard-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-button, .user-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 14px;
    }

    .icon-button {
      background: var(--surface-solid);
      color: var(--text-body);
      box-shadow: 0 12px 24px rgba(108, 125, 147, 0.08);
    }

    .user-badge {
      background: linear-gradient(135deg, #ffe5e5, #fff9e5);
      color: var(--text-strong);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .logout-btn {
      background: #fee2e2;
      color: #991b1b;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .dashboard-layout {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .welcome-banner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding: 30px;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: white;
      box-shadow: var(--shadow-lg);
      margin-bottom: 24px;
    }

    .welcome-banner h2 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .welcome-banner p {
      margin: 0;
      color: rgba(255, 255, 255, 0.92);
    }

    .wallet-card {
      background: var(--surface-solid);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .wallet-card strong {
      font-size: 1.3rem;
      color: var(--text-strong);
    }

    .wallet-card small {
      color: var(--text-soft);
    }

    .topup-btn {
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: var(--text-strong);
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: 600;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin: 24px 0 28px;
    }

    .action-card {
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      background: var(--surface-solid);
      box-shadow: var(--shadow-md);
      display: grid;
      gap: 10px;
      padding: 24px;
      text-align: left;
      transition: all 180ms ease;
    }

    .action-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .action-card strong {
      color: var(--text-strong);
      font-size: 1.1rem;
    }

    .action-card small {
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 28px 0 18px;
    }

    .section-header h2 {
      margin: 0;
      color: var(--text-strong);
    }

    .trip-grid {
      display: grid;
      gap: 16px;
    }

    .trip-card {
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      background: var(--surface-solid);
      box-shadow: var(--shadow-md);
      padding: 20px;
      cursor: pointer;
      transition: all 180ms ease;
    }

    .trip-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .trip-card__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .trip-card__driver {
      display: flex;
      gap: 12px;
    }

    .trip-card__avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .trip-card__driver h3 {
      margin: 0 0 4px;
      color: var(--text-strong);
      font-size: 1rem;
    }

    .trip-card__rating {
      display: flex;
      gap: 4px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .trip-card__price {
      text-align: right;
    }

    .trip-card__price strong {
      display: block;
      color: var(--text-strong);
      font-size: 1.1rem;
    }

    .trip-card__price small {
      color: var(--text-soft);
      font-size: 0.85rem;
    }

    .trip-card__route {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .trip-card__route strong {
      color: var(--text-strong);
    }

    .trip-card__route small {
      color: var(--text-soft);
    }

    .trip-card__meta {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .trip-card__footer {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .trip-card__time-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand-a);
    }

    /* SEARCH & BOOKING */
    .search-box {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      min-width: 150px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-solid);
      color: var(--text-strong);
      outline: none;
    }

    .search-box button {
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: var(--text-strong);
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-weight: 600;
      cursor: pointer;
      transition: all 180ms ease;
    }

    .search-box button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    /* BOOKING FORM */
    .booking-form {
      background: var(--surface-solid);
      border: 1px solid var(--line);
      padding: 24px;
      margin-bottom: 20px;
      border-radius: 20px;
    }

    .booking-form h3 {
      margin: 0 0 16px;
      color: var(--text-strong);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      display: grid;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.9rem;
      color: var(--text-body);
      font-weight: 500;
    }

    .form-group input, .form-group select {
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-muted);
      color: var(--text-strong);
      outline: none;
      font-size: 1rem;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--brand-a);
      background: var(--surface-solid);
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-muted);
      border-radius: 12px;
      padding: 8px 12px;
      width: fit-content;
    }

    .counter button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface-solid);
      color: var(--text-body);
      border: 1px solid var(--line);
      cursor: pointer;
      font-weight: 600;
      transition: all 120ms ease;
    }

    .counter button:hover {
      background: var(--brand-a);
      color: white;
    }

    .counter-value {
      text-align: center;
      min-width: 40px;
      font-weight: 600;
      color: var(--text-strong);
    }

    /* ALERTS */
    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .alert.show { display: block; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .alert-error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }

    /* BOOKING LISTS */
    .booking-item {
      background: var(--surface-solid);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .booking-item__info h4 {
      margin: 0 0 4px;
      color: var(--text-strong);
    }

    .booking-item__info p {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .booking-item__actions {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
    }

    .btn-confirm {
      background: #dcfce7;
      color: #166534;
    }

    .btn-confirm:hover {
      background: #bbf7d0;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-paid { background: #dbeafe; color: #1e40af; }
    .badge-confirmed { background: #dcfce7; color: #166534; }
    .badge-cancelled { background: #fee2e2; color: #991b1b; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-soft);
    }

    .empty-state p {
      margin: 0;
      font-size: 1rem;
    }

    /* REVIEW FORM */
    .review-form {
      background: var(--surface-solid);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .rating-stars {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .rating-stars button {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--surface-muted);
      border: 1px solid var(--line);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .rating-stars button.active {
      background: #fbbf24;
      border-color: #f59e0b;
    }

    .textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-muted);
      color: var(--text-strong);
      font-family: inherit;
      outline: none;
      resize: vertical;
    }

    @media (max-width: 768px) {
      .action-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
      <main class="auth-page">
        <section class="auth-shell">
          <header class="auth-brand">
            <h1>🚗 Carpool</h1>
            <p>แชร์การเดินทาง ประหยัดเงิน ทำความเพื่อน!</p>
          </header>
          <article class="auth-card">
            <div class="auth-tabs">
              <button class="auth-tab is-active" onclick="toggleAuthTab('login')">เข้าสู่ระบบ</button>
              <button class="auth-tab" onclick="toggleAuthTab('register')">ลงทะเบียน</button>
            </div>
            <form id="loginForm" class="auth-form" onsubmit="event.preventDefault();login()">
              <div class="field">
                <label>อีเมล</label>
                <input id="loginEmail" type="email" placeholder="your@email.com" required>
              </div>
              <div class="field">
                <label>รหัสผ่าน</label>
                <input id="loginPassword" type="password" placeholder="••••••••" required>
              </div>
              <button type="submit" class="auth-submit">เข้าสู่ระบบ</button>
              <div id="loginError" class="alert alert-error"></div>
            </form>
            <form id="registerForm" class="auth-form" style="display:none" onsubmit="event.preventDefault();register()">
              <div class="field">
                <label>ชื่อเต็ม</label>
                <input id="regName" type="text" placeholder="John Doe" required>
              </div>
              <div class="field">
                <label>อีเมล</label>
                <input id="regEmail" type="email" placeholder="your@email.com" required>
              </div>
              <div class="field">
                <label>รหัสผ่าน</label>
                <input id="regPassword" type="password" placeholder="••••••••" required>
              </div>
              <button type="submit" class="auth-submit">สร้างบัญชี</button>
              <div id="registerError" class="alert alert-error"></div>
            </form>
          </article>
        </section>
      </main>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="screen-dashboard" class="screen">
      <div class="dashboard-page">
        <header class="dashboard-header">
          <div class="dashboard-header__inner">
            <div class="dashboard-brand">🚗 Carpool Coolpa</div>
            <div class="dashboard-toolbar">
              <div id="userBadge" class="user-badge">JD</div>
              <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
            </div>
          </div>
        </header>
        <main class="dashboard-layout">
          <div class="welcome-banner">
            <div>
              <h2 id="welcomeName">สวัสดี!</h2>
              <p>วันนี้อยากเดินทางไปที่ไหนดี?</p>
            </div>
          </div>

          <div class="wallet-card">
            <div>
              <small>ยอดเงินในกระเป๋า</small><br>
              <strong id="walletBalance">฿0.00</strong>
            </div>
            <div style="display:flex; gap:8px">
              <input id="topupAmount" type="number" placeholder="จำนวนเงิน" style="width:100px; padding:8px; border-radius:8px; border:1px solid var(--line)">
              <button class="topup-btn" onclick="topUpWallet()">เติมเงิน</button>
            </div>
          </div>
          <div id="topupError" class="alert alert-error"></div>
          <div id="topupSuccess" class="alert alert-success"></div>

          <div class="action-grid">
            <button class="action-card" onclick="showScreen('search')">
              <strong>🔍 ค้นหาทริป</strong>
              <small>หาเพื่อนร่วมทางไปที่เดียวกับคุณ</small>
            </button>
            <button class="action-card" onclick="showScreen('create-trip')">
              <strong>➕ สร้างทริป</strong>
              <small>แชร์ที่ว่างในรถของคุณ</small>
            </button>
            <button class="action-card" onclick="showScreen('my-bookings')">
              <strong>📅 รายการจองของฉัน</strong>
              <small>ดูทริปที่คุณจองหรือคนจองคุณ</small>
            </button>
          </div>

          <div class="section-header">
            <h2>ทริปล่าสุด</h2>
            <button class="btn-small" onclick="loadTrips()">🔄 รีเฟรช</button>
          </div>
          <div id="tripsContainer" class="trip-grid">
            <!-- Trips will be loaded here -->
          </div>
        </main>
      </div>
    </div>

    <!-- SEARCH SCREEN -->
    <div id="screen-search" class="screen">
      <main class="dashboard-layout">
        <button class="btn-small" onclick="showScreen('dashboard')" style="margin-bottom:20px">← กลับ</button>
        <h2>ค้นหาทริป</h2>
        <div class="search-box">
          <input id="searchOrigin" type="text" placeholder="ต้นทาง (เช่น กรุงเทพ)">
          <input id="searchDest" type="text" placeholder="ปลายทาง (เช่น เชียงใหม่)">
          <button onclick="searchTrips()">ค้นหา</button>
        </div>
        <div id="searchResults" class="trip-grid">
          <!-- Search results here -->
        </div>
      </main>
    </div>

    <!-- CREATE TRIP SCREEN -->
    <div id="screen-create-trip" class="screen">
      <main class="dashboard-layout">
        <button class="btn-small" onclick="showScreen('dashboard')" style="margin-bottom:20px">← กลับ</button>
        <div class="booking-form">
          <h3>สร้างทริปใหม่</h3>
          <div class="form-row">
            <div class="form-group">
              <label>ต้นทาง</label>
              <input id="tripOrigin" type="text" placeholder="เช่น กรุงเทพ">
            </div>
            <div class="form-group">
              <label>ปลายทาง</label>
              <input id="tripDest" type="text" placeholder="เช่น พัทยา">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>วันเวลาเดินทาง</label>
              <input id="tripTime" type="datetime-local">
            </div>
            <div class="form-group">
              <label>จำนวนที่ว่าง</label>
              <input id="tripSeats" type="number" value="4" min="1">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>ราคาต่อที่นั่ง (฿)</label>
            <input id="tripPrice" type="number" placeholder="เช่น 200">
          </div>
          <button class="auth-submit" onclick="createTrip()">ลงประกาศทริป</button>
          <div id="tripError" class="alert alert-error" style="margin-top:10px"></div>
          <div id="tripSuccess" class="alert alert-success" style="margin-top:10px"></div>
        </div>
      </main>
    </div>

    <!-- BOOKING SCREEN -->
    <div id="screen-booking" class="screen">
      <main class="dashboard-layout">
        <button class="btn-small" onclick="showScreen('dashboard')" style="margin-bottom:20px">← กลับ</button>
        <div id="bookingDetails">
          <!-- Trip details to book -->
        </div>
      </main>
    </div>

    <!-- MY BOOKINGS SCREEN -->
    <div id="screen-my-bookings" class="screen">
      <main class="dashboard-layout">
        <button class="btn-small" onclick="showScreen('dashboard')" style="margin-bottom:20px">← กลับ</button>
        
        <h2>รายการจองของคุณ</h2>
        <div class="auth-tabs">
          <button id="tabBtnPassenger" class="auth-tab is-active" onclick="toggleBookingTab('passenger')">ฉันเป็นคนนั่ง</button>
          <button id="tabBtnDriver" class="auth-tab" onclick="toggleBookingTab('driver')">ฉันเป็นคนขับ</button>
        </div>

        <div id="confirmSuccess" class="alert alert-success"></div>

        <div id="tab-passenger-content">
          <h3>ทริปที่ฉันจอง</h3>
          <div id="passengerBookingsContainer"></div>
        </div>
        <div id="tab-driver-content" style="display:none">
          <h3>รายการที่มีคนจองทริปฉัน</h3>
          <div id="driverBookingsContainer"></div>
        </div>
      </main>
    </div>

    <!-- REVIEW SCREEN -->
    <div id="screen-review" class="screen">
      <main class="dashboard-layout">
        <button class="btn-small" onclick="showScreen('my-bookings')" style="margin-bottom:20px">← กลับ</button>
        <div class="review-form">
          <h3>ให้คะแนนการเดินทาง</h3>
          <input type="hidden" id="reviewBookingId">
          <div class="rating-stars" id="ratingStars">
            <button onclick="setRating(1)">⭐</button>
            <button onclick="setRating(2)">⭐</button>
            <button onclick="setRating(3)">⭐</button>
            <button onclick="setRating(4)">⭐</button>
            <button onclick="setRating(5)">⭐</button>
          </div>
          <input type="hidden" id="reviewRating">
          <textarea id="reviewComment" class="textarea" placeholder="เขียนความเห็นของคุณ..." rows="4"></textarea>
          <button class="auth-submit" onclick="submitReview()" style="margin-top:16px">ส่งรีวิว</button>
          <div id="reviewError" class="alert alert-error" style="margin-top:10px"></div>
          <div id="reviewSuccess" class="alert alert-success" style="margin-top:10px"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:8000/api";
    let currentUser = null;
    let selectedRating = 0;

    window.addEventListener('load', () => {
      const user = localStorage.getItem('user');
      if (user) {
        currentUser = JSON.parse(user);
        showScreen('dashboard');
        initDashboard();
      }
    });

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + screenId).classList.add('active');
      if (screenId === 'dashboard') initDashboard();
      if (screenId === 'my-bookings') {
          loadPassengerBookings();
          loadDriverBookings();
      }
    }

    function toggleAuthTab(type) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('is-active'));
      event.target.classList.add('is-active');
      if (type === 'login') {
        document.getElementById('loginForm').style.display = 'grid';
        document.getElementById('registerForm').style.display = 'none';
      } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'grid';
      }
    }

    function toggleBookingTab(type) {
      document.querySelectorAll('#screen-my-bookings .auth-tab').forEach(t => t.classList.remove('is-active'));
      event.target.classList.add('is-active');
      if (type === 'passenger') {
        document.getElementById('tab-passenger-content').style.display = 'block';
        document.getElementById('tab-driver-content').style.display = 'none';
      } else {
        document.getElementById('tab-passenger-content').style.display = 'none';
        document.getElementById('tab-driver-content').style.display = 'block';
      }
    }

    async function register() {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: name, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          currentUser = data.user;
          localStorage.setItem('user', JSON.stringify(currentUser));
          showScreen('dashboard');
        } else {
          showAlert('registerError', data.detail || 'ลงทะเบียนล้มเหลว', 'error');
        }
      } catch (e) { showAlert('registerError', 'Error: ' + e.message, 'error'); }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          currentUser = data.user;
          localStorage.setItem('user', JSON.stringify(currentUser));
          showScreen('dashboard');
        } else {
          showAlert('loginError', data.detail || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
        }
      } catch (e) { showAlert('loginError', 'Error: ' + e.message, 'error'); }
    }

    function logout() {
      localStorage.removeItem('user');
      currentUser = null;
      showScreen('login');
    }

    function initDashboard() {
      if (!currentUser) return;
      document.getElementById('welcomeName').textContent = `สวัสดี, ${currentUser.full_name}!`;
      document.getElementById('userBadge').textContent = currentUser.full_name.substring(0, 2).toUpperCase();
      loadWallet();
      loadTrips();
    }

    async function loadWallet() {
      try {
        const res = await fetch(`${API_URL}/wallet/${currentUser.id}`);
        const data = await res.json();
        currentUser.balance = data.balance;
        document.getElementById('walletBalance').textContent = `฿${data.balance.toLocaleString()}`;
      } catch (e) { console.error(e); }
    }

    async function topUpWallet() {
      const amount = parseFloat(document.getElementById('topupAmount').value);
      if (!amount || amount <= 0) return;
      try {
        const res = await fetch(`${API_URL}/wallet/topup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: currentUser.id, amount })
        });
        if (res.ok) {
          showAlert('topupSuccess', 'เติมเงินสำเร็จ!', 'success');
          document.getElementById('topupAmount').value = '';
          loadWallet();
        }
      } catch (e) { showAlert('topupError', e.message, 'error'); }
    }

    async function loadTrips() {
      try {
        const res = await fetch(`${API_URL}/trips/?user_id=${currentUser.id}`);
        const trips = await res.json();
        renderTrips(trips, 'tripsContainer');
      } catch (e) { console.error(e); }
    }

    async function searchTrips() {
      const origin = document.getElementById('searchOrigin').value;
      const dest = document.getElementById('searchDest').value;
      try {
        const res = await fetch(`${API_URL}/trips/?origin=${origin}&destination=${dest}&user_id=${currentUser.id}`);
        const trips = await res.json();
        const container = document.getElementById('searchResults');
        if (trips.length === 0) {
              container.innerHTML = '<div class="empty-state"><p>ไม่พบทริปที่ค้นหา</p></div>';
        } else {
              renderTrips(trips, 'searchResults');
        }
      } catch (e) { console.error(e); }
    }


    function renderTrips(trips, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      trips.forEach(t => {
        const card = document.createElement('div');
        card.className = 'trip-card';
        card.onclick = () => openBooking(t);
        card.innerHTML = `
          <div class="trip-card__top">
            <div class="trip-card__driver">
              <div class="trip-card__avatar">${t.driver.full_name.substring(0,1)}</div>
              <div>
                <h3>${t.driver.full_name}</h3>
                <div class="trip-card__rating">⭐ ${t.driver.rating > 0 ? t.driver.rating : 'ไม่มีรีวิว'} (${t.driver.trip_count} ทริป)</div>
              </div>
            </div>
            <div class="trip-card__price">
              <strong>฿${t.price_per_seat}</strong>
              <small>ต่อที่นั่ง</small>
            </div>
          </div>
          <div class="trip-card__route">
            <div><strong>${t.origin}</strong><br><small>ต้นทาง</small></div>
            <div style="padding-top:10px">→</div>
            <div><strong>${t.destination}</strong><br><small>ปลายทาง</small></div>
          </div>
          <div class="trip-card__footer">
            <div class="trip-card__time-dot"></div>
            <span>${new Date(t.departure_time).toLocaleString('th-TH')}</span>
            <span style="margin-left:auto">ว่าง ${t.available_seats} ที่</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function openBooking(trip) {
      const container = document.getElementById('bookingDetails');
      container.innerHTML = `
        <div class="booking-form">
          <h3>จองทริป: ${trip.origin} → ${trip.destination}</h3>
          <p>คนขับ: ${trip.driver.full_name} | ราคา: ฿${trip.price_per_seat}/ที่นั่ง</p>
          <div class="form-group">
            <label>เลือกจำนวนที่นั่ง (ว่าง ${trip.available_seats})</label>
            <select id="bookSeats">
              ${Array.from({length: trip.available_seats}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('')}
            </select>
          </div>
          <p style="margin-top:15px">ราคารวม: <strong id="totalPriceDisplay">฿${trip.price_per_seat}</strong></p>
          <button class="auth-submit" onclick="confirmBookingProcess(${trip.id}, ${trip.price_per_seat})">ยืนยันการจองและชำระเงิน</button>
          <div id="bookingError" class="alert alert-error" style="margin-top:10px"></div>
        </div>
      `;
      document.getElementById('bookSeats').onchange = (e) => {
          document.getElementById('totalPriceDisplay').textContent = `฿${(e.target.value * trip.price_per_seat).toLocaleString()}`;
      };
      showScreen('booking');
    }

    async function confirmBookingProcess(tripId, price) {
      const seats = parseInt(document.getElementById('bookSeats').value);
      try {
        const res = await fetch(`${API_URL}/bookings/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trip_id: tripId, passenger_id: currentUser.id, seats_booked: seats })
        });
        const data = await res.json();
        if (res.ok) {
          alert('จองและชำระเงินสำเร็จ! รอคนขับยืนยัน');
          showScreen('dashboard');
        } else {
          showAlert('bookingError', data.detail || 'จองไม่สำเร็จ', 'error');
        }
      } catch (e) { showAlert('bookingError', e.message, 'error'); }
    }

    async function createTrip() {
      const origin = document.getElementById('tripOrigin').value;
      const dest = document.getElementById('tripDest').value;
      const time = document.getElementById('tripTime').value;
      const seats = parseInt(document.getElementById('tripSeats').value);
      const price = parseFloat(document.getElementById('tripPrice').value);

      try {
        const res = await fetch(`${API_URL}/trips/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ driver_id: currentUser.id, origin, destination: dest, departure_time: new Date(time).toISOString(), total_seats: seats, price_per_seat: price })
        });
        if (res.ok) {
          showAlert('tripSuccess', 'สร้างทริปสำเร็จ!', 'success');
          setTimeout(() => showScreen('dashboard'), 1500);
        }
      } catch (e) { showAlert('tripError', e.message, 'error'); }
    }

    async function loadPassengerBookings() {
      try {
        const res = await fetch(`${API_URL}/bookings/user/${currentUser.id}`);
        const bookings = await res.json();
        const container = document.getElementById('passengerBookingsContainer');
        container.innerHTML = bookings.length === 0 ? '<p>ไม่มีรายการจอง</p>' : '';
        bookings.forEach(b => {
          const div = document.createElement('div');
          div.className = 'booking-item';
          div.innerHTML = `
            <div class="booking-item__info">
              <h4>${b.trip.origin} → ${b.trip.destination}</h4>
              <p>${b.seats_booked} ที่นั่ง | ฿${b.total_price} | <span class="badge badge-${b.status}">${b.status}</span></p>
            </div>
            ${b.status === 'confirmed' ? `<button class="btn-small" style="background:#fbbf24" onclick="openReviewForm(${b.id})">รีวิว</button>` : ''}
          `;
          container.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    async function loadDriverBookings() {
      try {
        const res = await fetch(`${API_URL}/bookings/driver/${currentUser.id}`);
        const bookings = await res.json();
        const container = document.getElementById('driverBookingsContainer');
        container.innerHTML = bookings.length === 0 ? '<p>ไม่มีคนจองทริปของคุณ</p>' : '';
        bookings.forEach(b => {
          const div = document.createElement('div');
          div.className = 'booking-item';
          div.innerHTML = `
            <div class="booking-item__info">
              <h4>ทริป: ${b.trip.origin} → ${b.trip.destination}</h4>
              <p>ผู้โดยสาร: ${b.passenger.full_name} | ${b.seats_booked} ที่นั่ง | <span class="badge badge-${b.status}">${b.status}</span></p>
            </div>
            ${b.status === 'paid' ? `<button class="btn-small btn-confirm" onclick="confirmBooking(${b.id})">ยืนยัน</button>` : ''}
          `;
          container.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    async function confirmBooking(id) {
      try {
        const res = await fetch(`${API_URL}/bookings/${id}/confirm`, { method: 'PUT' });
        if (res.ok) {
          showAlert('confirmSuccess', 'ยืนยันการจองแล้ว!', 'success');
          loadDriverBookings();
        }
      } catch (e) { console.error(e); }
    }

    function openReviewForm(id) {
      document.getElementById('reviewBookingId').value = id;
      showScreen('review');
    }

    function setRating(r) {
      selectedRating = r;
      document.getElementById('reviewRating').value = r;
      document.querySelectorAll('#ratingStars button').forEach((b, i) => {
        b.classList.toggle('active', i < r);
      });
    }

    async function submitReview() {
      const booking_id = parseInt(document.getElementById('reviewBookingId').value);
      const rating = selectedRating;
      const comment = document.getElementById('reviewComment').value;
      try {
        const res = await fetch(`${API_URL}/reviews/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ booking_id, rating, comment })
        });
        if (res.ok) {
          showAlert('reviewSuccess', 'ขอบคุณสำหรับรีวิว!', 'success');
          setTimeout(() => showScreen('my-bookings'), 1500);
        }
      } catch (e) { showAlert('reviewError', e.message, 'error'); }
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = `alert show alert-${type}`;
      setTimeout(() => el.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
